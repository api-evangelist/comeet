specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Comeet
providerId: comeet
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Rate Limiting
  - HR Tech
  - Recruiting
description: Comeet (Spark Hire Recruit) exposes a developer API at developers.comeet.com but does not
  publish explicit per-second rate-limit numbers. Partners must adhere to the technical restrictions in
  the API Terms of Use; consumers should implement defensive retry/backoff. API access is bundled with
  every ATS subscription tier.
sources:
  - https://developers.comeet.com/
  - https://recruit-support.sparkhire.com/hc/en-us/articles/40045047401371-Terms-of-Use-for-Comeet-API
notes: No published numeric rate limits; treat as soft limits enforced by API Terms of Use.
responseCodes:
  throttled: 429
limits:
  - name: Comeet REST API (undocumented numeric ceiling)
    scope: account
    metric: varies
    limit: see Terms of Use for Comeet API
policies:
  - name: Backoff
    description: Use exponential backoff with jitter on 429/503 responses.
  - name: Terms-governed
    description: Partners must follow technical restrictions in the API Terms of Use; abuse can result
      in key revocation.
  - name: Per-account scope
    description: Limits are tied to the customer ATS account/API key.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
