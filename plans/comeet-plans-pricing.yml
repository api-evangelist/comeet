specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Comeet
providerId: comeet
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - HR Tech
  - Recruiting
  - ATS
description: Comeet has been rebranded as Spark Hire Recruit, an applicant-tracking system sold via annual
  contract in three tiers (Recruit Pro, Recruit Growth, Recruit Enterprise). Pricing is per-organization,
  scaled by employee count, with annual billing only. Companion video-interview and behavioral-assessment
  products are sold separately. The Comeet/Spark Hire Recruit API is included with the ATS subscription.
sources:
  - https://www.sparkhire.com/pricing
  - https://developers.comeet.com/
plans:
  - id: comeet-recruit-pro
    name: Recruit Pro
    type: subscription
    description: Entry ATS tier for organizations up to 200 employees. Annual contract.
    entries:
      - label: Monthly subscription (annual billing)
        name: pro_monthly
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '335.00'
        userMultiplied: false
      - label: AI resume reviews
        name: pro_ai_reviews
        type: quota
        metric: review
        limit: 6000
        timeFrame: year
        geo: global
        unit: 1
        price: included
        userMultiplied: false
    elements:
      - name: Up to 200 employees
      - name: AI resume review (6,000/yr)
      - name: One-way video interviews
      - name: Comeet/Spark Hire Recruit API access
      - name: Annual contract only
  - id: comeet-recruit-growth
    name: Recruit Growth
    type: subscription
    description: Mid ATS tier for organizations up to 500 employees. Annual contract.
    entries:
      - label: Monthly subscription (annual billing)
        name: growth_monthly
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '499.00'
        userMultiplied: false
      - label: AI resume reviews
        name: growth_ai_reviews
        type: quota
        metric: review
        limit: 24000
        timeFrame: year
        geo: global
        unit: 1
        price: included
        userMultiplied: false
    elements:
      - name: Up to 500 employees
      - name: AI resume review (24,000/yr)
      - name: Predictive behavioral assessment
      - name: One-way and live video interviews
      - name: API access
  - id: comeet-recruit-enterprise
    name: Recruit Enterprise
    type: enterprise
    description: Custom-priced ATS tier for organizations with 500+ employees.
    entries:
      - label: Custom contract
        name: enterprise_custom
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
      - label: AI resume reviews
        name: enterprise_ai_reviews
        type: quota
        metric: review
        limit: 36000
        timeFrame: year
        geo: global
        unit: 1
        price: included
        userMultiplied: false
    elements:
      - name: 500+ employees
      - name: AI resume review (36,000/yr)
      - name: Customer success support
      - name: API access
