specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Comeet
providerId: comeet
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - FinOps
  - FOCUS
  - HR Tech
  - Recruiting
description: 'FOCUS-aligned FinOps for Comeet (Spark Hire Recruit): annual ATS subscription scaled by
  employee count, with included annual AI resume-review allotments per tier. API access is bundled, not
  metered.'
sources:
  - https://www.sparkhire.com/pricing
  - https://developers.comeet.com/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Spark Hire, Inc.
serviceCategory: HR Software
billingModel:
  pricingCategory: Tiered Subscription
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Tax
    - Adjustment
    - Refund
focusColumns:
  ServiceName: Comeet (Spark Hire Recruit)
  ServiceCategory: HR Software
  ProviderName: Spark Hire
  PublisherName: Spark Hire, Inc.
  InvoiceIssuerName: Spark Hire, Inc.
  BillingCurrency: USD
meters:
  - name: ats_subscription
    unit: month
    aggregation: sum
    dimensions:
      - tier
      - employee_band
  - name: ai_resume_reviews
    unit: review
    aggregation: sum
    dimensions:
      - tier
  - name: video_interview_addon
    unit: month
    aggregation: sum
  - name: behavioral_assessment_addon
    unit: month
    aggregation: sum
principles:
  - name: Visibility
    description: Track AI-resume-review consumption against the annual allotment in the Spark Hire admin
      console; monitor active hiring seats and pipeline volume.
  - name: Allocation
    description: Tag requisitions and hires by department/cost center to attribute ATS spend.
  - name: Optimization
    description: Right-size tier at annual renewal based on employee count and reviewer volume; bundle
      video-interview/assessment add-ons only where used.
  - name: Accountability
    description: Talent acquisition leadership owns ATS license; finance owns annual renewal and add-on
      spend.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
